<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 210">

  <!-- SKY gradient -->
  <rect x="0" y="0" width="320" height="175" fill="#C8E8F8"/>
  <!-- Soft clouds -->
  <ellipse cx="50" cy="30" rx="34" ry="18" fill="white" opacity="0.88"/>
  <ellipse cx="72" cy="22" rx="26" ry="16" fill="white" opacity="0.88"/>
  <ellipse cx="30" cy="35" rx="22" ry="14" fill="white" opacity="0.88"/>
  <ellipse cx="252" cy="28" rx="30" ry="16" fill="white" opacity="0.88"/>
  <ellipse cx="274" cy="22" rx="22" ry="14" fill="white" opacity="0.88"/>

  <!-- GROUND -->
  <rect x="0" y="172" width="320" height="38" fill="#5CB85C"/>
  <ellipse cx="160" cy="174" rx="168" ry="12" fill="#6DC86D"/>
  <!-- Garden path -->
  <path d="M130,208 Q160,175 190,208" stroke="#C8B870" stroke-width="6" fill="none" opacity="0.6"/>
  <!-- Topiary balls -->
  <circle cx="110" cy="174" r="12" fill="#3D9A3D"/>
  <rect x="106" y="174" width="8" height="10" fill="#2D7A2D"/>
  <circle cx="210" cy="174" r="12" fill="#3D9A3D"/>
  <rect x="206" y="174" width="8" height="10" fill="#2D7A2D"/>

  <!-- ===== CHÂTEAU ===== -->

  <!-- ROOF - left wing -->
  <path d="M14,94 L14,110 L98,110 L98,84 Z" fill="#8899AA"/>
  <path d="M14,94 L14,110 L16,110 L16,96 Z" fill="#6688AA" opacity="0.5"/>

  <!-- ROOF - right wing -->
  <path d="M222,84 L222,110 L306,110 L306,94 Z" fill="#8899AA"/>
  <path d="M304,94 L306,94 L306,110 L304,110 Z" fill="#6688AA" opacity="0.5"/>

  <!-- ROOF - central body -->
  <path d="M90,56 L90,80 L230,80 L230,56 Z" fill="#7A8EA0"/>
  <!-- Pediment triangle -->
  <path d="M110,56 L160,28 L210,56 Z" fill="#8899AA"/>
  <path d="M110,56 L160,32 L210,56 L208,56 L160,36 L112,56 Z" fill="#6688AA" opacity="0.4"/>
  <!-- Pediment ornament -->
  <circle cx="160" cy="44" r="7" fill="#C8B870"/>
  <text x="160" y="48" font-family="serif" font-size="8" fill="#8B6A10" text-anchor="middle">✦</text>

  <!-- DORMERS on central roof -->
  <rect x="120" y="44" width="16" height="14" rx="2" fill="#F5F2E8"/>
  <rect x="184" y="44" width="16" height="14" rx="2" fill="#F5F2E8"/>
  <path d="M120,44 L128,34 L136,44 Z" fill="#8899AA"/>
  <path d="M184,44 L192,34 L200,44 Z" fill="#8899AA"/>
  <rect x="123" y="47" width="10" height="9" rx="1" fill="#5A8AAA"/>

  <!-- LEFT WING body -->
  <rect x="14" y="108" width="86" height="64" rx="3" fill="#F5F2E8"/>
  <!-- Left wing shadow edge -->
  <rect x="14" y="108" width="5" height="64" rx="2" fill="#E0DDD0"/>

  <!-- RIGHT WING body -->
  <rect x="220" y="108" width="86" height="64" rx="3" fill="#F5F2E8"/>
  <!-- Right wing shadow edge -->
  <rect x="301" y="108" width="5" height="64" rx="2" fill="#E0DDD0"/>

  <!-- CENTRAL BODY -->
  <rect x="86" y="78" width="148" height="94" rx="3" fill="#F8F6EF"/>
  <rect x="86" y="78" width="6" height="94" rx="2" fill="#E8E5D8"/>

  <!-- ===== WINDOWS - LEFT WING (2 rows x 2) ===== -->
  <!-- Row 1 -->
  <rect x="26" y="118" width="24" height="30" rx="3" fill="#7AAAC8"/>
  <line x1="38" y1="118" x2="38" y2="148" stroke="#B8D4E8" stroke-width="1"/>
  <line x1="26" y1="133" x2="50" y2="133" stroke="#B8D4E8" stroke-width="1"/>
  <rect x="54" y="118" width="24" height="30" rx="3" fill="#7AAAC8"/>
  <line x1="66" y1="118" x2="66" y2="148" stroke="#B8D4E8" stroke-width="1"/>
  <line x1="54" y1="133" x2="78" y2="133" stroke="#B8D4E8" stroke-width="1"/>
  <!-- Shutters hint -->
  <rect x="24" y="118" width="4" height="30" rx="1" fill="#A8A890" opacity="0.6"/>
  <rect x="48" y="118" width="4" height="30" rx="1" fill="#A8A890" opacity="0.6"/>
  <rect x="52" y="118" width="4" height="30" rx="1" fill="#A8A890" opacity="0.6"/>
  <rect x="76" y="118" width="4" height="30" rx="1" fill="#A8A890" opacity="0.6"/>
  <!-- Row 2 - smaller decorative -->
  <rect x="32" y="153" width="18" height="16" rx="2" fill="#7AAAC8" opacity="0.8"/>
  <rect x="60" y="153" width="18" height="16" rx="2" fill="#7AAAC8" opacity="0.8"/>

  <!-- ===== WINDOWS - RIGHT WING ===== -->
  <rect x="242" y="118" width="24" height="30" rx="3" fill="#7AAAC8"/>
  <line x1="254" y1="118" x2="254" y2="148" stroke="#B8D4E8" stroke-width="1"/>
  <line x1="242" y1="133" x2="266" y2="133" stroke="#B8D4E8" stroke-width="1"/>
  <rect x="270" y="118" width="24" height="30" rx="3" fill="#7AAAC8"/>
  <line x1="282" y1="118" x2="282" y2="148" stroke="#B8D4E8" stroke-width="1"/>
  <line x1="270" y1="133" x2="294" y2="133" stroke="#B8D4E8" stroke-width="1"/>
  <rect x="240" y="118" width="4" height="30" rx="1" fill="#A8A890" opacity="0.6"/>
  <rect x="264" y="118" width="4" height="30" rx="1" fill="#A8A890" opacity="0.6"/>
  <rect x="268" y="118" width="4" height="30" rx="1" fill="#A8A890" opacity="0.6"/>
  <rect x="292" y="118" width="4" height="30" rx="1" fill="#A8A890" opacity="0.6"/>
  <rect x="246" y="153" width="18" height="16" rx="2" fill="#7AAAC8" opacity="0.8"/>
  <rect x="274" y="153" width="18" height="16" rx="2" fill="#7AAAC8" opacity="0.8"/>

  <!-- ===== WINDOWS - CENTRAL BODY (2 rows x 3) ===== -->
  <!-- Row 1 -->
  <rect x="96" y="88" width="26" height="34" rx="3" fill="#7AAAC8"/>
  <line x1="109" y1="88" x2="109" y2="122" stroke="#B8D4E8" stroke-width="1"/>
  <line x1="96" y1="105" x2="122" y2="105" stroke="#B8D4E8" stroke-width="1"/>
  <rect x="147" y="88" width="26" height="34" rx="3" fill="#7AAAC8"/>
  <line x1="160" y1="88" x2="160" y2="122" stroke="#B8D4E8" stroke-width="1"/>
  <line x1="147" y1="105" x2="173" y2="105" stroke="#B8D4E8" stroke-width="1"/>
  <rect x="198" y="88" width="26" height="34" rx="3" fill="#7AAAC8"/>
  <line x1="211" y1="88" x2="211" y2="122" stroke="#B8D4E8" stroke-width="1"/>
  <line x1="198" y1="105" x2="224" y2="105" stroke="#B8D4E8" stroke-width="1"/>
  <!-- Row 2 -->
  <rect x="96" y="130" width="26" height="30" rx="3" fill="#7AAAC8"/>
  <line x1="109" y1="130" x2="109" y2="160" stroke="#B8D4E8" stroke-width="1"/>
  <line x1="96" y1="145" x2="122" y2="145" stroke="#B8D4E8" stroke-width="1"/>
  <rect x="198" y="130" width="26" height="30" rx="3" fill="#7AAAC8"/>
  <line x1="211" y1="130" x2="211" y2="160" stroke="#B8D4E8" stroke-width="1"/>
  <line x1="198" y1="145" x2="224" y2="145" stroke="#B8D4E8" stroke-width="1"/>

  <!-- GRAND ENTRANCE (arched door) -->
  <rect x="142" y="134" width="36" height="38" rx="4" fill="#4A3828"/>
  <path d="M142,150 Q160,126 178,150" fill="#4A3828"/>
  <!-- Door columns -->
  <rect x="138" y="134" width="7" height="38" rx="2" fill="#E8E5D8"/>
  <rect x="175" y="134" width="7" height="38" rx="2" fill="#E8E5D8"/>
  <!-- Door detail -->
  <rect x="148" y="148" width="10" height="18" rx="2" fill="#6A5030" opacity="0.7"/>
  <rect x="162" y="148" width="10" height="18" rx="2" fill="#6A5030" opacity="0.7"/>
  <!-- Door knocker -->
  <circle cx="160" cy="160" r="3" fill="#C8A830"/>

  <!-- DECORATIVE TRIM line between floors -->
  <line x1="86" y1="126" x2="234" y2="126" stroke="#D8D0B8" stroke-width="2"/>
  <line x1="14" y1="138" x2="100" y2="138" stroke="#D8D0B8" stroke-width="2"/>
  <line x1="220" y1="138" x2="306" y2="138" stroke="#D8D0B8" stroke-width="2"/>

</svg>
